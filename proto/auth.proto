syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (SuccessResponse);
  rpc ConfirmRegister(ConfirmRegisterRequest) returns (JwtResponse);
  rpc Login(LoginRequest) returns (JwtResponse);
  rpc Refresh(RefreshAccessRequest) returns (RefreshAccessResponse);
}

// JWT
message JwtPayload {
  string sub = 1;
  string role = 2;
}

message JwtResponse {
  string accessToken = 1;
  string refreshToken = 2;
}

enum UserRoles {
  USER_ROLE_UNSPECIFIED = 0;
  USER = 1;
  ADMIN = 2;
}

// Success Response
message SuccessResponse {
  bool ok = 1;
}

// Register
message RegisterRequest {
  string email = 1;
  string password = 2;
}

// Confirm Register
message ConfirmRegisterRequest{
  string email = 1;
  int32 otp = 2;
}

// Refresh Access Token
message RefreshAccessRequest {
  string refreshToken = 1;
}

message RefreshAccessResponse {
  string accessToken = 1;
}

// Login
message LoginRequest {
  string email = 1;
  string password = 2;
}


