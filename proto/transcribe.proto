syntax = 'proto3';

package transcribe.v1;

import 'google/protobuf/empty.proto';

service TranscribeService {
  rpc TranscribeProcess(TranscribeProcessRequest) returns (TranscribeProcessResponse);
}

message TranscribeProcessRequest {
  string user_id = 1;
  string download_url = 2;
}

message TranscribeProcessResponse {
  bool success = 1;
}